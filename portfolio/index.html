<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maria Gurevich — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --color-bg: #F7F5F0;
    --color-surface: #FFFFFF;
    --color-text: #1A1A1A;
    --color-text-secondary: #6B6B6B;
    --color-accent: #2D5A3D;
    --color-accent-light: #E8F0EB;
    --color-border: #E2DFD8;
    --color-warm-grey: #9A9490;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'DM Sans', -apple-system, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--color-bg);
    color: var(--color-text);
    font-family: var(--font-body);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  header {
    padding: 60px 80px 50px;
    border-bottom: 1px solid var(--color-border);
    animation: fadeDown 0.6s ease-out;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  header h1 {
    font-family: var(--font-display);
    font-size: 3rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--color-text);
  }

  header .subtitle {
    font-size: 1.05rem;
    color: var(--color-warm-grey);
    margin-top: 6px;
    font-weight: 400;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* ── Projects Container ── */
  .projects { padding: 0 80px; }

  /* ── Project Card ── */
  .project {
    display: flex;
    gap: 50px;
    padding: 56px 0;
    border-bottom: 1px solid var(--color-border);
    animation: fadeUp 0.7s ease-out both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .project-info { flex: 1 1 58%; min-width: 0; }

  .project-info h2 {
    font-family: var(--font-display);
    font-size: 1.85rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
    color: var(--color-text);
  }

  .project-meta {
    font-size: 0.9rem;
    color: var(--color-warm-grey);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .project-meta .role {
    background: var(--color-accent-light);
    color: var(--color-accent);
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 0.82rem;
    font-weight: 500;
  }

  .project-description {
    font-size: 1rem;
    line-height: 1.75;
    color: var(--color-text-secondary);
    max-width: 560px;
    margin-bottom: 14px;
  }

  .project-stack {
    font-size: 0.82rem;
    color: var(--color-warm-grey);
    font-style: italic;
  }

  /* ── Gallery ── */
  .project-gallery {
    flex: 1 1 42%;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .gallery-main {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 10;
    border-radius: 12px;
    overflow: hidden;
    background: var(--color-border);
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    transition: box-shadow 0.3s ease;
  }

  .gallery-main:hover { box-shadow: 0 8px 30px rgba(0,0,0,0.1); }

  .gallery-main img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
  }

  .gallery-main:hover img { transform: scale(1.02); }

  .gallery-expand-hint {
    position: absolute;
    bottom: 12px;
    right: 12px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.75rem;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease;
    backdrop-filter: blur(4px);
  }

  .gallery-main:hover .gallery-expand-hint { opacity: 1; }

  .placeholder-img {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    color: var(--color-warm-grey);
    background: linear-gradient(135deg, #e8e5df 0%, #d9d5ce 100%);
  }

  .gallery-dots {
    display: flex;
    gap: 6px;
    justify-content: center;
    padding: 4px 0;
  }

  .gallery-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--color-border);
    cursor: pointer;
    transition: background 0.25s ease;
  }

  .gallery-dot.active { background: var(--color-warm-grey); }
  .gallery-dot:hover { background: var(--color-warm-grey); }

  /* ── Lightbox ── */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    backdrop-filter: blur(8px);
    animation: lbFadeIn 0.25s ease;
  }

  .lightbox.open { display: flex; }

  @keyframes lbFadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .lightbox img {
    max-width: 88vw;
    max-height: 78vh;
    object-fit: contain;
    border-radius: 8px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    animation: lbZoomIn 0.3s ease;
  }

  @keyframes lbZoomIn {
    from { transform: scale(0.92); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .lightbox-caption {
    color: rgba(255,255,255,0.85);
    font-size: 0.95rem;
    font-family: var(--font-body);
    text-align: center;
    max-width: 600px;
    padding: 0 24px;
    min-height: 1.4em;
  }

  .lightbox-close {
    position: absolute;
    top: 24px; right: 28px;
    background: none; border: none;
    color: #fff; font-size: 2rem;
    cursor: pointer; opacity: 0.7;
    transition: opacity 0.2s; line-height: 1;
  }

  .lightbox-close:hover { opacity: 1; }

  .lightbox-nav {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.12);
    border: none; color: #fff; font-size: 1.6rem;
    width: 48px; height: 48px; border-radius: 50%;
    cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: background 0.2s; backdrop-filter: blur(4px);
  }

  .lightbox-nav:hover { background: rgba(255,255,255,0.22); }
  .lightbox-prev { left: 24px; }
  .lightbox-next { right: 24px; }

  .lightbox-counter {
    position: absolute;
    bottom: 24px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 0.8rem; font-family: var(--font-body);
  }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    header { padding: 40px 32px 36px; }
    header h1 { font-size: 2.2rem; }
    .projects { padding: 0 32px; }
    .project { flex-direction: column; gap: 28px; padding: 40px 0; }
    .project-gallery { order: -1; }
  }

  @media (max-width: 540px) {
    header { padding: 32px 20px 28px; }
    header h1 { font-size: 1.8rem; }
    .projects { padding: 0 20px; }
    .project-info h2 { font-size: 1.4rem; }
  }
</style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <h1>Maria Gurevich</h1>
  <div class="subtitle">Portfolio</div>
</header>

<!-- ── Projects (rendered by JS from projects.json) ── -->
<div class="projects" id="projects-container"></div>

<!-- ── Lightbox ── -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
  <button class="lightbox-nav lightbox-prev" onclick="lightboxNav(-1)">&#8249;</button>
  <img id="lightbox-img" src="" alt="">
  <div class="lightbox-caption" id="lightbox-caption"></div>
  <button class="lightbox-nav lightbox-next" onclick="lightboxNav(1)">&#8250;</button>
  <div class="lightbox-counter" id="lightbox-counter"></div>
</div>

<script>
  let allProjects = [];
  let projectImages = []; // array of arrays: [{src, caption}, ...]
  let currentSlide = [];
  let lightboxProject = 0;
  let lightboxIndex = 0;

  async function init() {
    try {
      const res = await fetch('projects.json');
      allProjects = await res.json();
    } catch (e) {
      console.error('Could not load projects.json:', e);
      return;
    }

    // Build image lists directly from projects.json — no images.json needed
    projectImages = allProjects.map(project => {
      if (!project.images || !project.images.length) return [];
      return project.images.map(img => ({
        src: `${project.imgDir}/${img.file}`,
        caption: img.caption || ''
      }));
    });

    currentSlide = allProjects.map(() => 0);
    renderProjects();
  }

  function renderProjects() {
    const container = document.getElementById('projects-container');
    container.innerHTML = allProjects.map((project, i) => {
      const images = projectImages[i];
      const hasImages = images.length > 0;

      const mainImageHTML = hasImages
        ? `<img src="${images[0].src}" alt="${project.name} screenshot">
           <div class="gallery-expand-hint">Click to expand</div>`
        : `<div class="placeholder-img">Images coming soon</div>`;

      const dotsHTML = hasImages && images.length > 1
        ? images.map((_, ti) =>
            `<div class="gallery-dot ${ti === 0 ? 'active' : ''}" onclick="setSlide(${i}, ${ti})"></div>`
          ).join('')
        : '';

      const parts = project.subtitle.split('|');
      const dateRange = parts[0] ? parts[0].trim() : '';
      const role = parts[1] ? parts[1].trim() : '';

      return `
        <div class="project" data-project="${i}" style="animation-delay: ${i * 0.15}s">
          <div class="project-info">
            <h2>${project.name}</h2>
            <div class="project-meta">
              <span>${dateRange}</span>
              ${role ? `<span class="role">${role}</span>` : ''}
            </div>
            <p class="project-description">${project.description}</p>
            ${project.stack ? `<div class="project-stack">${project.stack}</div>` : ''}
          </div>
          <div class="project-gallery">
            <div class="gallery-main" id="main-${i}"
              ${hasImages ? `onclick="openLightbox(${i}, currentSlide[${i}])"` : ''}>
              ${mainImageHTML}
            </div>
            <div class="gallery-dots" id="dots-${i}">
              ${dotsHTML}
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function setSlide(pIdx, slideIdx) {
    const images = projectImages[pIdx];
    if (!images.length) return;
    currentSlide[pIdx] = slideIdx;

    const mainEl = document.getElementById(`main-${pIdx}`);
    const img = mainEl.querySelector('img');
    if (img) img.src = images[slideIdx].src;

    document.querySelectorAll(`#dots-${pIdx} .gallery-dot`)
      .forEach((d, i) => d.classList.toggle('active', i === slideIdx));
  }

  function openLightbox(pIdx, slideIdx) {
    const images = projectImages[pIdx];
    if (!images.length) return;
    lightboxProject = pIdx;
    lightboxIndex = slideIdx || 0;
    updateLightbox();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function updateLightbox() {
    const images = projectImages[lightboxProject];
    const current = images[lightboxIndex];
    document.getElementById('lightbox-img').src = current.src;
    document.getElementById('lightbox-caption').textContent = current.caption || '';
    document.getElementById('lightbox-counter').textContent =
      images.length > 1 ? `${lightboxIndex + 1} / ${images.length}` : '';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function lightboxNav(dir) {
    const images = projectImages[lightboxProject];
    lightboxIndex = (lightboxIndex + dir + images.length) % images.length;
    updateLightbox();
  }

  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeLightbox();
  });

  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') lightboxNav(-1);
    if (e.key === 'ArrowRight') lightboxNav(1);
  });

  init();
</script>

</body>
</html>
